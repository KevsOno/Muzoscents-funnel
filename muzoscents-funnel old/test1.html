<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penafort Value Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Exact Penafort Brand Colors */
        .brand-green { color: #00A651; }
        .bg-brand-green { background-color: #00A651; }
        .brand-blue { color: #003366; }
        .bg-brand-blue { background-color: #003366; }
    </style>
</head>
<body class="bg-[#F4F7F6] min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="app" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-gray-100 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-3 bg-brand-green"></div>

        <header class="mb-10 pt-4">
            <img src="https://www.penafortenergy.com/asset/img/penafort-logo-green.png" 
                 alt="Penafort Logo" 
                 class="h-16 mx-auto mb-6">
            
            <h2 class="text-xl font-black brand-blue tracking-tight uppercase">Value Rewards</h2>
            <p class="text-brand-green text-[10px] font-bold uppercase tracking-[0.3em] mt-1">Member Portal</p>
        </header>
        
        <div id="search-section" class="space-y-6">
            <div class="text-left">
                <label for="phone-input" class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Member Phone Number</label>
                <input id="phone-input" type="tel" placeholder="e.g. 234803000000" 
                    class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl text-lg font-bold text-gray-800 focus:ring-4 focus:ring-green-50 focus:border-brand-green outline-none transition-all">
            </div>
            
            <button onclick="checkPoints()" id="check-btn" 
                class="w-full bg-brand-blue hover:bg-[#002244] text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-[0.97] tracking-widest text-sm">
                CHECK BALANCE
            </button>
        </div>

        <div id="result-section" class="hidden animate-in fade-in zoom-in duration-500">
            <div class="bg-gradient-to-br from-[#00A651] to-[#008541] p-8 rounded-[2rem] mb-8 shadow-2xl relative overflow-hidden text-white text-left">
                <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-white/10 rounded-full"></div>
                
                <p class="text-green-100 text-[10px] font-bold uppercase tracking-widest mb-1">Loyalty Member</p>
                <h3 id="display-name" class="text-2xl font-black mb-6 truncate">Member</h3>
                
                <div class="bg-black/10 backdrop-blur-md rounded-2xl p-5 border border-white/10">
                    <p class="text-[10px] font-bold text-green-50 uppercase tracking-widest mb-1">Available Points</p>
                    <h1 id="display-points" class="text-5xl font-black tracking-tighter">0</h1>
                </div>

                <div id="display-tier" class="mt-6 inline-block bg-white text-brand-green text-[10px] font-black px-6 py-2 rounded-full uppercase tracking-widest shadow-md"></div>
            </div>
            
            <div class="px-4">
                <p id="message-box" class="text-gray-600 text-sm font-medium leading-relaxed italic"></p>
            </div>

            <button onclick="window.location.reload()" 
                class="mt-10 text-gray-400 hover:text-brand-blue text-[10px] font-black uppercase tracking-widest transition-colors flex items-center justify-center mx-auto gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Go Back
            </button>
        </div>

        <footer class="mt-12 pt-6 border-t border-gray-50">
            <p class="text-[9px] text-gray-300 font-bold uppercase tracking-widest">© 2026 Penafort Energy Nigeria Ltd.</p>
        </footer>
    </div>

    <script>
        async function checkPoints() {
            const phoneField = document.getElementById('phone-input');
            const btn = document.getElementById('check-btn');
            const phone = phoneField.value.trim();

            if (!phone) return alert("Please enter your phone number.");

            btn.innerText = "SEARCHING...";
            btn.disabled = true;
            btn.style.opacity = "0.7";

            try {
                const response = await fetch('/.netlify/functions/get-points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error);

                document.getElementById('search-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');

                document.getElementById('display-name').innerText = data.first_name;
                document.getElementById('display-points').innerText = Number(data.current_points).toLocaleString();
                document.getElementById('display-tier').innerText = `TIER ${data.tier} MEMBER`;
                document.getElementById('message-box').innerText = `Visit any Penafort station to convert your points into rewards. We value your patronage!`;

            } catch (err) {
                alert("Account not found. Please verify the number.");
                btn.innerText = "CHECK BALANCE";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
