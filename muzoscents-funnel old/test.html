<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penafort Energy | Loyalty Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --navy: #002147; --green: #2ecc71; }
        .bg-navy { background-color: var(--navy); }
        .text-navy { color: var(--navy); }
        .bg-green { background-color: var(--green); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow-md p-4">
        <div class="container mx-auto">
            <div class="text-2xl font-bold text-navy uppercase">
                PENAFORT<span class="text-green-500">ENERGY</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto">
            
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 mb-6">
                <h2 class="text-2xl font-bold text-navy mb-2 text-center">Rewards Portal</h2>
                <p class="text-gray-400 text-sm text-center mb-6 uppercase tracking-widest">Search by ID, Email, or Phone</p>
                
                <div class="space-y-4">
                    <input type="text" id="searchInput" placeholder="Enter ID, Email or Phone" 
                           class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-green-500 rounded-2xl outline-none text-center font-semibold">
                    
                    <button onclick="searchMember()" class="w-full bg-navy text-white font-bold py-4 rounded-2xl hover:bg-black transition-all shadow-lg">
                        Check My Points
                    </button>
                </div>

                <div id="loader" class="hidden text-center mt-4 text-navy font-bold animate-pulse text-sm">Accessing Database...</div>
                <div id="error" class="hidden text-center mt-4 text-red-500 font-bold text-sm"></div>
            </div>

            <div id="result" class="hidden bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
                <div class="bg-navy p-8 text-white text-center">
                    <div id="userInitials" class="w-20 h-20 bg-green rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4">P</div>
                    <h3 id="resName" class="text-2xl font-bold tracking-tight uppercase">---</h3>
                </div>
                
                <div class="p-10 text-center">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Total Accrued Points</p>
                    <div id="resPoints" class="text-7xl font-black text-navy mb-4">0</div>
                    <div class="inline-block px-6 py-2 bg-green/10 text-green-700 rounded-full text-xs font-bold uppercase tracking-widest">
                        Verified Member
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Use this direct API link for the test to work
        const API_URL = "https://sheetdb.io/api/v1/7v0s5mxlsoila";

        async function searchMember() {
            const query = document.getElementById('searchInput').value.trim();
            const loader = document.getElementById('loader');
            const error = document.getElementById('error');
            const result = document.getElementById('result');

            if (!query) return;

            loader.classList.remove('hidden');
            error.classList.add('hidden');
            result.classList.add('hidden');

            try {
                // Testing connection to SheetDB
                const searchUrl = `${API_URL}/search_or?PENAFORT%20ID=${query}&EMAIL%20ADDRESS=${query}&MOBILE%20NUMBER=${query}&casesensitive=false`;
                
                const response = await fetch(searchUrl);
                const data = await response.json();

                if (data && data.length > 0) {
                    const user = data[0];
                    document.getElementById('resName').innerText = user["NAME"];
                    document.getElementById('resPoints').innerText = user["POINTS"] || "0";
                    document.getElementById('userInitials').innerText = user["NAME"].charAt(0).toUpperCase();
                    
                    loader.classList.add('hidden');
                    result.classList.remove('hidden');
                } else {
                    loader.classList.add('hidden');
                    error.innerText = "Member not found. Check your Sheet columns.";
                    error.classList.remove('hidden');
                }
            } catch (e) {
                loader.classList.add('hidden');
                error.innerText = "Connection Error. Use the direct API URL, not Bitly.";
                error.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
