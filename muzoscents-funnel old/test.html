<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penafort Rewards Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --navy: #002147; --green: #2ecc71; }
        .bg-navy { background-color: var(--navy); }
        .text-navy { color: var(--navy); }
        .bg-green { background-color: var(--green); }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

    <nav class="bg-white shadow p-4 mb-10">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-xl font-bold text-navy uppercase">Penafort<span class="text-green-500">Energy</span></div>
        </div>
    </nav>

    <div class="max-w-md mx-auto px-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold text-navy mb-2 text-center">Member Portal</h2>
            <p class="text-gray-400 text-xs text-center mb-6 uppercase tracking-widest font-bold">Search by ID, Email, or Phone</p>
            
            <input type="text" id="searchInput" placeholder="Enter ID, Email or Phone" 
                   class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-green-500 rounded-2xl mb-4 outline-none transition-all">
            
            <button onclick="searchMember()" class="w-full bg-navy text-white font-bold py-4 rounded-2xl hover:opacity-90 transition shadow-lg">
                Check Rewards
            </button>

            <div id="loader" class="hidden text-center mt-4 text-navy font-bold animate-pulse text-sm">Accessing Rewards Database...</div>
            <div id="error" class="hidden text-center mt-4 text-red-500 font-bold text-sm"></div>
        </div>

        <div id="result" class="hidden mt-6 bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 animate-in fade-in duration-500">
            <div class="bg-navy p-6 text-white text-center">
                <div id="userInitials" class="w-16 h-16 bg-green rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-3">P</div>
                <h3 id="resName" class="text-xl font-bold">---</h3>
                <p id="resSub" class="text-xs opacity-60">---</p>
            </div>
            <div class="p-8 text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Accrued Points</p>
                <div id="resPoints" class="text-7xl font-black text-navy mb-4">0</div>
                <div class="inline-block px-4 py-1 bg-green/10 text-green-700 rounded-full text-xs font-bold">✓ Verified Member</div>
            </div>
        </div>
    </div>

   <script>
    // PASTE YOUR GOOGLE WEB APP URL HERE
    const SCRIPT_URL = "YOUR_COPIED_WEB_APP_URL_HERE";

    async function searchMember() {
        const query = document.getElementById('searchInput').value.trim();
        const loader = document.getElementById('loader');
        const error = document.getElementById('error');
        const result = document.getElementById('result');

        if(!query) return;

        loader.classList.remove('hidden');
        error.classList.add('hidden');
        result.classList.add('hidden');

        try {
            // This calls your Google Script directly
            const response = await fetch(`${SCRIPT_URL}?id=${encodeURIComponent(query)}`);
            const user = await response.json();

            if(user) {
                document.getElementById('resName').innerText = user.name;
                document.getElementById('resSub').innerText = user.email || user.mobile;
                document.getElementById('resPoints').innerText = user.points;
                document.getElementById('userInitials').innerText = user.name.charAt(0).toUpperCase();
                result.classList.remove('hidden');
            } else {
                error.innerText = "Member not found. Check your ID or Email.";
                error.classList.remove('hidden');
            }
        } catch (e) {
            error.innerText = "Connection error. Ensure your Script is deployed to 'Anyone'.";
            error.classList.remove('hidden');
        } finally {
            loader.classList.add('hidden');
        }
    }
</script>
</body>
</html>
