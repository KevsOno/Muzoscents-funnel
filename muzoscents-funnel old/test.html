<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penafort Energy | Member Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --navy: #002147; --green: #2ecc71; }
        .bg-navy { background-color: var(--navy); }
        .text-navy { color: var(--navy); }
        .bg-green { background-color: var(--green); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <nav class="bg-white shadow-sm p-4 border-b">
        <div class="container mx-auto">
            <div class="text-2xl font-black text-navy uppercase tracking-tighter">
                PENAFORT<span class="text-green-500">ENERGY</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12 text-center">
        <div class="max-w-md mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border border-white">
            <h2 class="text-2xl font-bold text-navy mb-1">Welcome Back</h2>
            <p class="text-gray-400 text-[10px] uppercase tracking-[0.2em] mb-8 font-bold">Rewards & Loyalty Portal</p>
            
            <div class="space-y-4">
                <input type="text" id="searchInput" placeholder="ID, Email or Phone" 
                       class="w-full p-5 bg-gray-50 border-2 border-transparent focus:border-green-500 rounded-2xl outline-none text-center font-bold text-lg transition-all shadow-inner">
                
                <button onclick="searchMember()" class="w-full bg-navy text-white font-bold py-5 rounded-2xl hover:bg-black transition-all shadow-lg active:scale-95">
                    Check My Points
                </button>
            </div>

            <div id="loader" class="hidden mt-6 text-navy font-bold animate-pulse text-xs uppercase tracking-widest">Searching Database...</div>
            <div id="error" class="hidden mt-6 p-4 bg-red-50 text-red-600 rounded-xl font-bold text-[10px] uppercase"></div>

            <div id="result" class="hidden mt-8 border-t pt-8 animate-in fade-in zoom-in duration-300 text-center">
                <div id="userInitials" class="w-20 h-20 bg-green text-white rounded-full flex items-center justify-center text-3xl font-black mx-auto mb-4 shadow-xl border-4 border-white">P</div>
                <h3 id="resName" class="text-xl font-black text-navy uppercase tracking-tight">---</h3>
                <p id="resSub" class="text-[10px] font-bold text-gray-400 mt-1 uppercase">---</p>
                
                <div class="my-8">
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-2">Current Balance</p>
                    <div id="resPoints" class="text-7xl font-black text-navy tracking-tighter">0</div>
                </div>
                
                <div class="inline-flex items-center px-4 py-1 bg-green/10 text-green-700 rounded-full text-[10px] font-black uppercase tracking-widest">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                    Verified Member
                </div>
            </div>
        </div>
    </main>

    <script>
        // Use the direct API URL
        const API_URL = "https://sheetdb.io/api/v1/7v0s5mxlsoila";

        async function searchMember() {
            const query = document.getElementById('searchInput').value.trim();
            const loader = document.getElementById('loader');
            const error = document.getElementById('error');
            const result = document.getElementById('result');

            if (!query) return;

            loader.classList.remove('hidden');
            error.classList.add('hidden');
            result.classList.add('hidden');

            try {
                // Fetch ALL data once - this is more reliable for 'Table' formatted sheets
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Connection Failed");
                
                const data = await response.json();

                // Find user by checking all possible columns (ID, Email, Phone, Name)
                const user = data.find(row => 
                    Object.values(row).some(val => 
                        val.toString().toLowerCase() === query.toLowerCase()
                    )
                );

                if (user) {
                    // Logic to find 'Points' even if the header has weird spacing
                    const pointsKey = Object.keys(user).find(k => k.toLowerCase().includes('point'));
                    const nameKey = Object.keys(user).find(k => k.toLowerCase().includes('name'));
                    const emailKey = Object.keys(user).find(k => k.toLowerCase().includes('email') || k.toLowerCase().includes('mail'));

                    document.getElementById('resName').innerText = user[nameKey] || "Member";
                    document.getElementById('resSub').innerText = user[emailKey] || "";
                    document.getElementById('resPoints').innerText = user[pointsKey] || "0";
                    document.getElementById('userInitials').innerText = (user[nameKey] || "P").charAt(0).toUpperCase();
                    
                    loader.classList.add('hidden');
                    result.classList.remove('hidden');
                } else {
                    throw new Error("No record found for '" + query + "'");
                }
            } catch (e) {
                loader.classList.add('hidden');
                error.innerText = e.message;
                error.classList.remove('hidden');
                console.error("System Log:", e);
            }
        }
    </script>
</body>
</html>
