<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penafort Energy Member Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">

    <nav class="max-w-4xl mx-auto mb-10 flex justify-between items-center">
        <div class="text-xl font-black text-blue-900 italic">PENAFORT<span class="text-green-500">ENERGY</span></div>
    </nav>

    <div class="max-w-md mx-auto">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Member Portal</h2>
            
            <div class="space-y-4">
                <input type="text" id="searchInput" placeholder="ID, Email, or Phone" 
                       class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-green-500 text-center font-bold">
                
                <button onclick="Portal.search()" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl hover:bg-black transition-all">
                    Check Rewards
                </button>
            </div>

            <div id="loader" class="hidden text-center mt-4 animate-pulse text-blue-900 font-bold text-xs">Connecting...</div>
            <div id="error" class="hidden mt-4 p-3 bg-red-50 text-red-600 rounded-lg text-center text-xs font-bold uppercase"></div>
        </div>

        <div class="mt-6 bg-blue-50/50 border border-blue-100 p-4 rounded-2xl">
            <div class="flex items-center gap-2 mb-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">AI Strategy Assistant</span>
            </div>
            <p id="ai-response" class="text-sm text-blue-900 italic">Waking up the brain...</p>
        </div>

        <div id="result" class="hidden mt-6 bg-white rounded-3xl shadow-lg overflow-hidden border border-gray-100">
            <div class="bg-blue-900 p-6 text-white text-center">
                <h3 id="resName" class="text-xl font-bold uppercase">---</h3>
                <p id="resID" class="text-[10px] opacity-60">---</p>
            </div>
            <div class="p-8 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Points Balance</p>
                <div id="resPoints" class="text-5xl font-black text-blue-900 my-2">0</div>
            </div>
        </div>
    </div>

    <script>
        const Portal = {
            SHEET_URL: "https://sheetdb.io/api/v1/a4z6gyofxc4lo",
            AI_URL: "https://kevsono-aibot.hf.space/chat",

            // Wake up the AI when the page loads
            async initAI() {
                const display = document.getElementById("ai-response");
                try {
                    const res = await fetch(this.AI_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: "Hello! Provide a 1-sentence tip for renewable energy users." })
                    });
                    
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    display.innerText = data.response;
                } catch (err) {
                    display.innerText = "Connection to AI failed. Check your internet or CORS settings.";
                    display.classList.add("text-red-400");
                }
            },

            async search() {
                const query = document.getElementById('searchInput').value.trim().toLowerCase();
                const loader = document.getElementById('loader');
                const error = document.getElementById('error');
                const result = document.getElementById('result');

                if (!query) return;

                loader.classList.remove('hidden');
                error.classList.add('hidden');
                result.classList.add('hidden');

                try {
                    const response = await fetch(this.SHEET_URL);
                    const data = await response.json();
                    const user = data.find(row => 
                        Object.values(row).some(v => v?.toString().toLowerCase().includes(query))
                    );

                    if (!user) throw new Error("Member not found.");

                    document.getElementById('resName').innerText = user.NAME || user.Name || "Member";
                    document.getElementById('resID').innerText = `ID: ${user['PENAFORT ID'] || 'N/A'}`;
                    document.getElementById('resPoints').innerText = (user.POINTS || 0).toLocaleString();
                    
                    result.classList.remove('hidden');
                } catch (e) {
                    error.innerText = e.message;
                    error.classList.remove('hidden');
                } finally {
                    loader.classList.add('hidden');
                }
            }
        };

        // Start AI on load
        window.onload = () => Portal.initAI();
    </script>
</body>
</html>
