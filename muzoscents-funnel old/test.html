<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom brand colors to keep classes clean */
        :root { --navy: #000080; --brand-green: #22c55e; }
        .text-navy { color: var(--navy); }
        .bg-navy { background-color: var(--navy); }
        .bg-green-soft { background-color: rgba(34, 197, 94, 0.1); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-sm p-4 mb-10 border-b">
        <div class="container mx-auto">
            <div class="text-2xl font-black text-navy uppercase italic">
                PENAFORT<span class="text-green-500">ENERGY</span>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4">
        <section class="bg-white p-8 rounded-[2rem] shadow-2xl border border-gray-100">
            <h2 class="text-2xl font-bold text-navy mb-2 text-center">Member Portal</h2>
            <p class="text-gray-400 text-[10px] text-center mb-8 uppercase tracking-[0.2em] font-bold">
                Search by ID, Email, Name or Phone
            </p>
            
            <div class="space-y-4">
                <input type="text" id="searchInput" placeholder="Enter Details Here..." 
                       class="w-full p-5 bg-gray-50 border-2 border-transparent focus:border-green-500 rounded-2xl outline-none text-center font-bold text-lg transition-all shadow-inner">
                
                <button onclick="App.handleSearch()" class="w-full bg-navy text-white font-bold py-5 rounded-2xl hover:bg-black transition-all shadow-lg active:scale-95">
                    Check Rewards
                </button>
            </div>

            <div id="loader" class="hidden text-center mt-6 text-navy font-bold animate-pulse text-xs">Connecting to Database...</div>
            <div id="error" class="hidden text-center mt-6 p-4 bg-red-50 text-red-600 rounded-xl font-bold text-[10px] uppercase"></div>
        </section>

        <section id="result" class="hidden mt-8 bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100 animate-in fade-in zoom-in duration-300">
            <header class="bg-navy p-10 text-white text-center">
                <div id="userInitials" class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center text-3xl font-black mx-auto mb-4 border-4 border-white/10 shadow-xl">P</div>
                <h3 id="resName" class="text-2xl font-bold tracking-tight uppercase">---</h3>
                <p id="resID" class="text-[10px] font-bold opacity-40 mt-1 uppercase tracking-widest">---</p>
            </header>
            
            <div class="p-10 text-center">
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-2">Total Accrued Points</p>
                <div id="resPoints" class="text-7xl font-black text-navy mb-4 tracking-tighter">0</div>
                <div class="inline-flex items-center px-4 py-1 bg-green-soft text-green-700 rounded-full text-[10px] font-black uppercase tracking-widest">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 animate-ping"></span> Verified Member
                </div>
            </div>
        </section>
    </main>

    <script>
        const App = {
            API_URL: "https://sheetdb.io/api/v1/a4z6gyofxc4lo",
            
            // UI Helpers
            toggle(id, show) { document.getElementById(id).classList.toggle('hidden', !show); },
            
            setText(id, text) { document.getElementById(id).innerText = text; },

            async handleSearch() {
                const query = document.getElementById('searchInput').value.trim().toLowerCase();
                if (!query) return this.showError("Please enter member details");

                this.toggle('loader', true);
                this.toggle('error', false);
                this.toggle('result', false);

                try {
                    const response = await fetch(this.API_URL);
                    const data = await response.json();
                    
                    const user = data.find(row => 
                        Object.values(row).some(v => v?.toString().toLowerCase().includes(query))
                    );

                    if (!user) throw new Error("No matching member found.");

                    this.renderUser(user);
                } catch (e) {
                    this.showError(e.message);
                } finally {
                    this.toggle('loader', false);
                }
            },

            renderUser(user) {
                // Key Mapping
                const name = user.NAME || user.Name || "Valued Member";
                const id = user['PENAFORT ID'] || user.ID || "N/A";
                const rawPoints = user.POINTS || user.Points || "0";
                
                // Formatting
                const points = parseInt(rawPoints.toString().replace(/\D/g, '')) || 0;
                const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();

                this.setText('resName', name);
                this.setText('resID', `Member ID: ${id}`);
                this.setText('resPoints', points.toLocaleString());
                this.setText('userInitials', initials);
                
                this.toggle('result', true);
            },

            showError(msg) {
                this.setText('error', msg);
                this.toggle('error', true);
            }
        };
    </script>
</body>
</html>
