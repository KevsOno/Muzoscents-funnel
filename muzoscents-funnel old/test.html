<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevs Digital Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        /* your existing styles – keep them as they are */
        /* ... */
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4">

<!-- Auth modal (no Supabase) -->
<div id="authModal" class="auth-modal">
    <div class="auth-modal-content">
        <span class="auth-close" id="modalClose">&times;</span>
        <h3 id="modalTitle" class="text-xl font-bold mb-4">Login</h3>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email address">
            <input type="password" id="loginPassword" placeholder="Password">
            <div style="margin:5px 0;"><label><input type="checkbox" id="showPasswordLogin"> Show Password</label></div>
            <div style="text-align:right;"><a href="#" id="forgotPasswordLink" style="font-size:0.75rem; color:#6b4b9a;">Forgot password?</a></div>
            <button id="doLoginBtn" style="width:100%; margin-top:15px;">Login</button>
        </div>
        <div id="signupForm" style="display:none;">
            <div class="name-row"><div><input type="text" id="signupFirstName" placeholder="First name *"></div><div><input type="text" id="signupLastName" placeholder="Last name *"></div></div>
            <input type="email" id="signupEmail" placeholder="Email address *">
            <input type="tel" id="signupPhone" placeholder="Phone (optional)">
            <input type="password" id="signupPassword" placeholder="Password *">
            <div style="margin:5px 0;"><label><input type="checkbox" id="showPasswordSignup"> Show Password</label></div>
            <button id="doSignupBtn" style="width:100%; margin-top:15px;">Create Account</button>
        </div>
        <div class="toggle-form"><a id="showSignupLink">Don't have an account? Sign up</a></div>
        <div id="authMessage" class="auth-message"></div>
    </div>
</div>

<!-- Main app (hidden until login) -->
<div id="mainApp" style="display: none;">
    <nav class="max-w-4xl mx-auto mb-6 flex justify-between items-center">
        <div class="text-xl font-black text-blue-900 italic">Kevs<span class="text-green-500">Digital</span></div>
        <div class="flex items-center gap-3">
            <div class="text-xs text-gray-400 flex items-center gap-1.5">
                <span class="live-dot w-2 h-2 rounded-full bg-green-400 inline-block"></span>
                <span id="headerUser">—</span>
            </div>
            <button id="logoutBtn" class="text-xs bg-gray-200 hover:bg-gray-300 px-3 py-1.5 rounded-full transition-all">Logout</button>
        </div>
    </nav>

    <!-- BI interface (tabs, chat, history, profile) – copy your existing structure -->
    <!-- You can reuse the Portal object from earlier but adapt all fetch URLs -->
</div>

<script>
const API_BASE = 'https://your-backend-url.com'; // e.g., https://kevsono-penafort-concierge.hf.space

let authToken = localStorage.getItem('auth_token');
let userId = localStorage.getItem('user_id');

// Helper to show message in auth modal
function showMessage(text, isError = true) {
    const msgDiv = document.getElementById('authMessage');
    msgDiv.innerText = text;
    msgDiv.style.color = isError ? '#dc2626' : '#16a34a';
    setTimeout(() => { if (msgDiv.innerText === text) msgDiv.innerText = ''; }, 5000);
}

// ---------- AUTH HANDLERS ----------
async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showMessage('Email and password required'); return; }
    const btn = document.getElementById('doLoginBtn');
    btn.disabled = true;
    btn.innerText = 'Logging in...';
    try {
        const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        authToken = data.access_token;
        userId = data.user_id;
        localStorage.setItem('auth_token', authToken);
        localStorage.setItem('user_id', userId);
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        Portal.loadUserContext();
        Portal.loadHistory();
    } catch(err) {
        showMessage(err.message);
    } finally {
        btn.disabled = false;
        btn.innerText = 'Login';
    }
}

async function handleSignup() {
    const firstName = document.getElementById('signupFirstName').value.trim();
    const lastName = document.getElementById('signupLastName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const phone = document.getElementById('signupPhone').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!firstName || !lastName || !email || !password) {
        showMessage('First name, last name, email and password required');
        return;
    }
    const btn = document.getElementById('doSignupBtn');
    btn.disabled = true;
    btn.innerText = 'Creating...';
    try {
        // Register
        const regRes = await fetch(`${API_BASE}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const regData = await regRes.json();
        if (!regRes.ok) throw new Error(regData.detail || 'Registration failed');
        // Auto login
        const loginRes = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const loginData = await loginRes.json();
        if (!loginRes.ok) throw new Error('Account created but could not log in automatically. Please log in manually.');
        authToken = loginData.access_token;
        userId = loginData.user_id;
        // Update profile with name and phone
        await fetch(`${API_BASE}/bi/profile`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
            body: JSON.stringify({ first_name: firstName, last_name: lastName, phone: phone || null })
        });
        localStorage.setItem('auth_token', authToken);
        localStorage.setItem('user_id', userId);
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        Portal.loadUserContext();
        Portal.loadHistory();
        showMessage('Account created and logged in!', false);
    } catch(err) {
        showMessage(err.message);
    } finally {
        btn.disabled = false;
        btn.innerText = 'Create Account';
    }
}

async function handleLogout() {
    if (authToken) {
        await fetch(`${API_BASE}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${authToken}` } });
    }
    localStorage.removeItem('auth_token');
    localStorage.removeItem('user_id');
    location.reload();
}

// Forgot password
document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) { showMessage('Enter your email address'); return; }
    try {
        const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        if (!res.ok) throw new Error(await res.text());
        showMessage('Password reset email sent. Check your inbox.', false);
    } catch(err) {
        showMessage(err.message);
    }
});

// Toggle login/signup forms
let showingLogin = true;
document.getElementById('showSignupLink').addEventListener('click', () => {
    showingLogin = !showingLogin;
    document.getElementById('loginForm').style.display = showingLogin ? 'block' : 'none';
    document.getElementById('signupForm').style.display = showingLogin ? 'none' : 'block';
    document.getElementById('modalTitle').innerText = showingLogin ? 'Login' : 'Create Account';
    document.getElementById('showSignupLink').innerText = showingLogin ? "Don't have an account? Sign up" : "Back to Login";
    document.getElementById('authMessage').innerText = '';
});

document.getElementById('doLoginBtn').onclick = handleLogin;
document.getElementById('doSignupBtn').onclick = handleSignup;
document.getElementById('logoutBtn').onclick = handleLogout;

// Show/hide password
document.getElementById('showPasswordLogin').addEventListener('change', function() {
    document.getElementById('loginPassword').type = this.checked ? 'text' : 'password';
});
document.getElementById('showPasswordSignup').addEventListener('change', function() {
    document.getElementById('signupPassword').type = this.checked ? 'text' : 'password';
});

// Close modal when clicking outside
const modal = document.getElementById('authModal');
document.getElementById('modalClose').onclick = () => modal.style.display = 'none';
window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

// ================================
// PORTAL OBJECT (chat, history, profile)
// ================================
const Portal = {
    location: "Lagos, Nigeria",
    niche: "local SME market",
    budget: 500000,
    activePillar: 3,
    chatHistory: [],
    currentTab: "analysis",

    updateHeader() {
        document.getElementById("headerUser").innerText = userId ? userId.slice(0,8)+"..." : "—";
    },

    loadUserContext() {
        this.location = localStorage.getItem('pf_location') || this.location;
        this.niche = localStorage.getItem('pf_niche') || this.niche;
        this.budget = parseInt(localStorage.getItem('pf_budget')) || this.budget;
        document.getElementById("profLocation").value = this.location;
        document.getElementById("profNiche").value = this.niche;
        document.getElementById("profBudget").value = this.budget;
        this.updateHeader();
        this.fetchProfileFromBackend();
    },

    async fetchProfileFromBackend() {
        if (!userId) return;
        try {
            const res = await fetch(`${API_BASE}/bi/profile`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            if (res.ok) {
                const data = await res.json();
                if (data.location) this.location = data.location;
                if (data.niche) this.niche = data.niche;
                if (data.budget) this.budget = data.budget;
                document.getElementById("profLocation").value = this.location;
                document.getElementById("profNiche").value = this.niche;
                document.getElementById("profBudget").value = this.budget;
                localStorage.setItem('pf_location', this.location);
                localStorage.setItem('pf_niche', this.niche);
                localStorage.setItem('pf_budget', this.budget);
            }
        } catch(e) { console.warn('Profile fetch failed', e); }
    },

    async saveProfile() {
        this.location = document.getElementById("profLocation").value.trim() || this.location;
        this.niche = document.getElementById("profNiche").value.trim() || this.niche;
        this.budget = parseInt(document.getElementById("profBudget").value) || this.budget;
        localStorage.setItem('pf_location', this.location);
        localStorage.setItem('pf_niche', this.niche);
        localStorage.setItem('pf_budget', this.budget);
        const msg = document.getElementById("profileMsg");
        try {
            await fetch(`${API_BASE}/bi/profile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                body: JSON.stringify({ location: this.location, niche: this.niche, budget: this.budget })
            });
            msg.textContent = "✅ Context saved.";
        } catch(e) {
            msg.textContent = "✅ Saved locally.";
        }
        msg.classList.remove("hidden");
        setTimeout(() => msg.classList.add("hidden"), 3000);
    },

    async loadHistory() {
        if (!userId) return;
        const list = document.getElementById("historyList");
        list.innerHTML = '<p class="text-xs text-gray-400 text-center py-6">Loading...</p>';
        try {
            const res = await fetch(`${API_BASE}/bi/history`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            const data = await res.json();
            if (!data.history || data.history.length === 0) {
                list.innerHTML = '<p class="text-xs text-gray-400 text-center py-10">No history yet.</p>';
                return;
            }
            const PILLAR_LABELS = {1:"👥 Customer",2:"🏪 Market",3:"⚙️ Capability",4:"📈 Growth"};
            list.innerHTML = data.history.map(h => {
                const date = new Date(h.timestamp).toLocaleString("en-NG", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
                const label = PILLAR_LABELS[h.pillar] || "🔗 Analysis";
                const preview = h.response?.substring(0,120)+(h.response?.length>120?"...":"");
                return `<div class="history-item p-4 cursor-pointer hover:bg-blue-50 transition-all" onclick="Portal.replayHistory('${encodeURIComponent(h.query)}')">
                    <div class="flex justify-between items-start mb-1"><span class="text-xs font-bold text-blue-900">${label}</span><span class="text-xs text-gray-400">${date}</span></div>
                    <p class="text-xs font-medium text-gray-700 mb-1 truncate">${h.query}</p>
                    <p class="text-xs text-gray-400 leading-relaxed">${preview}</p>
                </div>`;
            }).join("");
        } catch(e) {
            list.innerHTML = '<p class="text-xs text-red-400 text-center py-6">Could not load history.</p>';
        }
    },

    replayHistory(encodedQuery) {
        this.switchTab("analysis");
        document.getElementById("chatInput").value = decodeURIComponent(encodedQuery);
    },

    switchTab(tab) {
        this.currentTab = tab;
        ["analysis","history","profile"].forEach(t => {
            document.getElementById(`panel${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("hidden", t !== tab);
            document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).classList.toggle("tab-active", t === tab);
        });
        if (tab === "history") this.loadHistory();
    },

    setPillar(num) {
        this.activePillar = num;
        for (let i=1; i<=4; i++) {
            document.getElementById(`pillar${i}Btn`).className = `pillar-btn ${i===num ? "pillar-active" : "pillar-inactive"} px-3 py-2.5 rounded-lg text-xs font-bold text-left`;
        }
    },

    updateUsage(usage) {
        if (!usage) return;
        const { requests_used, remaining, is_premium, limit } = usage;
        document.getElementById("usageLabel").innerHTML = is_premium ? "∞ (Premium)" : `${requests_used} / ${limit}`;
        const pct = Math.min(100, Math.round((requests_used/limit)*100));
        const bar = document.getElementById("usageBarFill");
        bar.style.width = `${pct}%`;
        bar.style.background = pct>=80 ? "#EF4444" : (pct>=60 ? "#F59E0B" : "#22C55E");
        if (pct>=80) document.getElementById("upgradeBanner").classList.remove("hidden");
    },

    addMessage(text, role) {
        const container = document.getElementById("chatMessages");
        const div = document.createElement("div");
        div.className = role==="user" ? "msg-user self-end max-w-xs text-sm px-4 py-3 rounded-xl rounded-br-sm fade-in" : "msg-ai self-start max-w-xs text-sm px-4 py-3 rounded-xl rounded-bl-sm fade-in";
        div.textContent = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    },

    addTyping() {
        const div = document.createElement("div");
        div.id = "typingIndicator";
        div.className = "msg-ai self-start px-4 py-3 rounded-xl rounded-bl-sm text-blue-300 text-sm italic";
        div.innerHTML = '<span class="typing-dot">●</span><span class="typing-dot">●</span><span class="typing-dot">●</span>';
        document.getElementById("chatMessages").appendChild(div);
    },

    removeTyping() {
        const el = document.getElementById("typingIndicator");
        if (el) el.remove();
    },

    quickAsk(text) {
        document.getElementById("chatInput").value = text;
        this.sendMessage();
    },

    async sendMessage() {
        const input = document.getElementById("chatInput");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        this.addMessage(text, "user");
        this.chatHistory.push({ role: "user", content: text });
        this.addTyping();
        document.getElementById("sendBtn").disabled = true;

        try {
            const res = await fetch(`${API_BASE}/bi/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${authToken}` },
                body: JSON.stringify({
                    message: text,
                    history: this.chatHistory.slice(-6),
                    location: this.location,
                    niche: this.niche,
                    budget: this.budget,
                    force_pillar: this.activePillar
                })
            });
            this.removeTyping();
            if (!res.ok) throw new Error(`Service error (${res.status})`);
            const data = await res.json();
            if (data.meta?.model) document.getElementById("modelBadge").textContent = data.meta.model;
            this.updateUsage(data.usage);
            this.addMessage(data.response || "No response.", "ai");
            this.chatHistory.push({ role: "assistant", content: data.response });
        } catch(err) {
            this.removeTyping();
            this.addMessage(err.message, "ai");
        }
        document.getElementById("sendBtn").disabled = false;
        if (this.chatHistory.length > 20) this.chatHistory = this.chatHistory.slice(-20);
    }
};

// Restore session on page load
(async function() {
    const storedToken = localStorage.getItem('auth_token');
    const storedUserId = localStorage.getItem('user_id');
    if (storedToken && storedUserId) {
        authToken = storedToken;
        userId = storedUserId;
        // Optionally verify token with /auth/me
        try {
            const res = await fetch(`${API_BASE}/auth/me`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            if (!res.ok) throw new Error('Token invalid');
            // Token valid, show main app
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            Portal.loadUserContext();
            Portal.loadHistory();
            return;
        } catch(e) {
            console.warn('Session restore failed', e);
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_id');
        }
    }
    document.getElementById('authModal').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
})();
</script>
</body>
</html>
